name: Screenshot audit

on:
  schedule:
    # Every Monday at 06:00 UTC. Adjust to taste -- cron syntax is
    # minute hour day-of-month month day-of-week.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screenshot audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/audit_screenshots.py \
            --config config.yml \
            --apply \
            --report reports/screenshot-audit-${{ github.run_number }}.md

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-audit-report
          path: reports/screenshot-audit-${{ github.run_number }}.md

      - name: Open PR with any changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: screenshot naming audit"
          title: "Screenshot naming audit -- ${{ github.run_number }}"
          body-path: reports/screenshot-audit-${{ github.run_number }}.md
          branch: screenshot-audit/${{ github.run_number }}
          delete-branch: true
          add-paths: |
            **/*.png
            **/*.jpg
            **/*.jpeg
            **/*.gif
            **/*.webp
            **/*.svg
            **/*.md
            **/*.mdx
            **/*.html
            reports/**
